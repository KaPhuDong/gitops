apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: be
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: '1'
spec:
  project: default
  source:
    repoURL: https://github.com/KaPhuDong/gitops.git # TODO: thay bang URL Git that neu repo doi
    targetRevision: main
    path: k8s
    directory:
      include: backend.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
