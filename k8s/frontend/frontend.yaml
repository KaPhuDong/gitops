apiVersion: v1
kind: Service
metadata:
  name: frontend-svc
  namespace: demo
  annotations:
    argocd.argoproj.io/sync-wave: '2'
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: demo
  annotations:
    argocd.argoproj.io/sync-wave: '2'
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: nginx:alpine
          command: ['/bin/sh', '-c']
          args:
            - echo "<h1>Welcome to React/NextJS Frontend!</h1><p>Status:Connected to Cluster</p>" > /usr/share/nginx/html/index.html && nginx -g "daemon off;"
          ports:
            - containerPort: 80
