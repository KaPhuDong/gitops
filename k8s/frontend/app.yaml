apiVersion: v1
kind: Service
metadata:
  name: fe-svc
  namespace: demo
  annotations:
    argocd.argoproj.io/sync-wave: '2'
spec:
  selector:
    app: fe
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fe
  namespace: demo
  annotations:
    argocd.argoproj.io/sync-wave: '2'
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fe
  template:
    metadata:
      labels:
        app: fe
    spec:
      containers:
        - name: fe
          image: nginx:alpine
          command:
            - /bin/sh
            - -c
          args:
            - 'echo "<h1>Frontend</h1><p>Status: Connected to Cluster</p>" > /usr/share/nginx/html/index.html && nginx -g "daemon off;"'
          ports:
            - containerPort: 80
