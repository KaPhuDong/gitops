apiVersion: v1
kind: ConfigMap
metadata:
  name: fe-page
  namespace: demo
  annotations:
    argocd.argoproj.io/sync-wave: '1'
data:
  index.html: |
    <!doctype html>
    <html lang="en">
    <head>
      <meta charset="utf-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1" />
      <title>Ka Phu Dong | GitOps Control Panel</title>
      <style>
        :root {
          --ink: #0f172a;
          --muted: #64748b;
          --line: #fed7aa;
          --orange: #f59e0b;
          --orange-strong: #ea580c;
          --orange-soft: #fff7ed;
          --white: #ffffff;
          --green: #16a34a;
          --red: #dc2626;
          --shadow: 0 24px 70px rgba(234, 88, 12, 0.16);
        }

        * {
          box-sizing: border-box;
        }

        body {
          margin: 0;
          min-height: 100vh;
          color: var(--ink);
          font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
          background:
            linear-gradient(180deg, rgba(255, 247, 237, 0.9), rgba(255, 255, 255, 0.98) 42%),
            repeating-linear-gradient(90deg, rgba(245, 158, 11, 0.08) 0 1px, transparent 1px 88px);
        }

        button,
        a {
          font: inherit;
        }

        .page {
          width: min(1160px, calc(100% - 32px));
          margin: 0 auto;
          padding: 28px 0 40px;
        }

        .topbar {
          display: flex;
          align-items: center;
          justify-content: space-between;
          gap: 16px;
          margin-bottom: 30px;
        }

        .brand {
          display: flex;
          align-items: center;
          gap: 12px;
          font-weight: 900;
        }

        .mark {
          width: 44px;
          height: 44px;
          display: grid;
          place-items: center;
          color: var(--white);
          border-radius: 8px;
          background: linear-gradient(135deg, var(--orange), var(--orange-strong));
          box-shadow: 0 14px 32px rgba(245, 158, 11, 0.28);
        }

        .pill {
          display: inline-flex;
          align-items: center;
          gap: 8px;
          min-height: 34px;
          padding: 0 12px;
          color: #9a3412;
          border: 1px solid var(--line);
          border-radius: 8px;
          background: var(--orange-soft);
          font-size: 13px;
          font-weight: 800;
        }

        .layout {
          display: grid;
          grid-template-columns: minmax(0, 1.05fr) minmax(360px, 0.95fr);
          gap: 24px;
          align-items: stretch;
        }

        .hero,
        .panel {
          border: 1px solid var(--line);
          border-radius: 8px;
          background: rgba(255, 255, 255, 0.92);
          box-shadow: var(--shadow);
        }

        .hero {
          padding: clamp(28px, 5vw, 54px);
          min-height: 560px;
          display: flex;
          flex-direction: column;
          justify-content: space-between;
          overflow: hidden;
          position: relative;
        }

        .hero::before {
          content: "";
          position: absolute;
          inset: auto -12% -30% 32%;
          height: 360px;
          background: radial-gradient(circle, rgba(245, 158, 11, 0.2), transparent 68%);
          pointer-events: none;
        }

        .eyebrow {
          color: var(--orange-strong);
          font-size: 12px;
          font-weight: 900;
          letter-spacing: 0.14em;
          text-transform: uppercase;
        }

        h1 {
          max-width: 760px;
          margin: 14px 0 0;
          font-size: clamp(42px, 7vw, 82px);
          line-height: 0.96;
          letter-spacing: 0;
        }

        .accent {
          color: var(--orange-strong);
        }

        .lead {
          max-width: 680px;
          margin: 22px 0 0;
          color: var(--muted);
          font-size: clamp(17px, 2vw, 21px);
          line-height: 1.7;
        }

        .cards {
          display: grid;
          grid-template-columns: repeat(3, 1fr);
          gap: 12px;
          margin-top: 36px;
          position: relative;
        }

        .card {
          min-height: 120px;
          padding: 16px;
          border: 1px solid var(--line);
          border-radius: 8px;
          background: var(--white);
        }

        .card strong {
          display: block;
          margin-bottom: 8px;
          color: var(--ink);
          font-size: 15px;
        }

        .card span {
          color: var(--muted);
          font-size: 14px;
          line-height: 1.5;
        }

        .panel {
          padding: 22px;
          display: flex;
          flex-direction: column;
          gap: 16px;
        }

        .panel h2 {
          margin: 0;
          font-size: 28px;
          line-height: 1.1;
        }

        .panel p {
          margin: 0;
          color: var(--muted);
          line-height: 1.6;
        }

        .actions {
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 12px;
        }

        .button {
          min-height: 48px;
          border: 1px solid var(--line);
          border-radius: 8px;
          color: var(--ink);
          background: var(--white);
          font-weight: 900;
          cursor: pointer;
        }

        .button.primary {
          color: var(--white);
          border-color: var(--orange-strong);
          background: linear-gradient(135deg, var(--orange), var(--orange-strong));
        }

        .button:disabled {
          cursor: wait;
          opacity: 0.65;
        }

        .stats {
          display: grid;
          grid-template-columns: repeat(3, 1fr);
          gap: 10px;
        }

        .stat {
          padding: 14px;
          border: 1px solid var(--line);
          border-radius: 8px;
          background: var(--orange-soft);
        }

        .stat strong {
          display: block;
          font-size: 28px;
        }

        .stat span {
          color: var(--muted);
          font-size: 12px;
          font-weight: 900;
          text-transform: uppercase;
        }

        .result {
          min-height: 200px;
          padding: 16px;
          border: 1px solid var(--line);
          border-radius: 8px;
          background: #431407;
          color: #ffedd5;
          font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
          font-size: 13px;
          line-height: 1.6;
          white-space: pre-wrap;
          overflow: auto;
        }

        .status {
          display: flex;
          align-items: center;
          gap: 10px;
          color: var(--muted);
          font-size: 13px;
          font-weight: 800;
        }

        .dot {
          width: 10px;
          height: 10px;
          border-radius: 50%;
          background: var(--green);
          box-shadow: 0 0 0 6px rgba(22, 163, 74, 0.12);
        }

        .dot.error {
          background: var(--red);
          box-shadow: 0 0 0 6px rgba(220, 38, 38, 0.12);
        }

        @media (max-width: 920px) {
          .layout,
          .cards {
            grid-template-columns: 1fr;
          }

          .hero {
            min-height: auto;
          }
        }

        @media (max-width: 560px) {
          .topbar,
          .actions,
          .stats {
            grid-template-columns: 1fr;
            align-items: flex-start;
            flex-direction: column;
          }
        }
      </style>
    </head>
    <body>
      <main class="page">
        <header class="topbar">
          <div class="brand">
            <span class="mark">KD</span>
            <span>Ka Phu Dong</span>
          </div>
          <div class="pill">GitOps Frontend - Live API Traffic</div>
        </header>

        <section class="layout">
          <div class="hero">
            <div>
              <div class="eyebrow">Orange release dashboard</div>
              <h1>Hi, I am <span class="accent">Ka Phu Dong</span>.</h1>
              <p class="lead">
                I build and operate Kubernetes workloads with GitOps, observability, and progressive delivery.
                This frontend is served by nginx, managed by Argo CD, and wired to the API through an in-cluster proxy.
              </p>
            </div>

            <div class="cards">
              <div class="card">
                <strong>GitOps</strong>
                <span>Every change is declared in Git and synchronized by Argo CD.</span>
              </div>
              <div class="card">
                <strong>Observability</strong>
                <span>API requests are exported as Prometheus metrics for alerts and analysis.</span>
              </div>
              <div class="card">
                <strong>Canary</strong>
                <span>Burst traffic helps test rollout analysis without manual curl loops.</span>
              </div>
            </div>
          </div>

          <aside class="panel">
            <div>
              <div class="eyebrow">API tester</div>
              <h2>Trigger traffic from the browser</h2>
              <p>Use a single request to inspect the API response, or run a burst to generate traffic for Prometheus, Argo Rollouts analysis, and Alertmanager rules.</p>
            </div>

            <div class="actions">
              <button class="button primary" id="callBtn" type="button">Call API</button>
              <button class="button" id="burstBtn" type="button">Burst 100 Calls</button>
            </div>

            <div class="stats">
              <div class="stat"><strong id="totalCount">0</strong><span>Total</span></div>
              <div class="stat"><strong id="okCount">0</strong><span>Success</span></div>
              <div class="stat"><strong id="failCount">0</strong><span>Errors</span></div>
            </div>

            <div class="status"><span class="dot" id="statusDot"></span><span id="statusText">Ready to call /api/</span></div>
            <pre class="result" id="result">No request yet.</pre>
          </aside>
        </section>
      </main>

      <script>
        const callBtn = document.getElementById("callBtn");
        const burstBtn = document.getElementById("burstBtn");
        const result = document.getElementById("result");
        const statusText = document.getElementById("statusText");
        const statusDot = document.getElementById("statusDot");
        const totalCount = document.getElementById("totalCount");
        const okCount = document.getElementById("okCount");
        const failCount = document.getElementById("failCount");

        const state = { total: 0, ok: 0, fail: 0 };

        function renderStats() {
          totalCount.textContent = state.total;
          okCount.textContent = state.ok;
          failCount.textContent = state.fail;
        }

        function setStatus(text, failed = false) {
          statusText.textContent = text;
          statusDot.classList.toggle("error", failed);
        }

        async function callApi() {
          const started = performance.now();
          const response = await fetch("/api/", { cache: "no-store" });
          const elapsed = Math.round(performance.now() - started);
          let body;

          try {
            body = await response.json();
          } catch {
            body = { raw: await response.text() };
          }

          state.total += 1;
          if (response.ok) state.ok += 1;
          else state.fail += 1;
          renderStats();

          return {
            status: response.status,
            ok: response.ok,
            elapsedMs: elapsed,
            body
          };
        }

        callBtn.addEventListener("click", async () => {
          callBtn.disabled = true;
          setStatus("Calling API...");
          try {
            const data = await callApi();
            result.textContent = JSON.stringify(data, null, 2);
            setStatus(data.ok ? "API responded successfully." : "API returned an error.", !data.ok);
          } catch (error) {
            state.total += 1;
            state.fail += 1;
            renderStats();
            result.textContent = error.stack || String(error);
            setStatus("API call failed before receiving a response.", true);
          } finally {
            callBtn.disabled = false;
          }
        });

        burstBtn.addEventListener("click", async () => {
          burstBtn.disabled = true;
          callBtn.disabled = true;
          setStatus("Burst running: 100 API requests...");

          const batchSize = 10;
          const requests = 100;
          const samples = [];

          try {
            for (let i = 0; i < requests; i += batchSize) {
              const batch = Array.from({ length: batchSize }, () => callApi().catch(error => {
                state.total += 1;
                state.fail += 1;
                renderStats();
                return { status: 0, ok: false, elapsedMs: 0, body: { error: String(error) } };
              }));
              const results = await Promise.all(batch);
              samples.push(...results.slice(0, 2));
              setStatus(`Burst running: ${Math.min(i + batchSize, requests)} / ${requests} requests sent...`);
            }

            const recent = samples.slice(-10);
            result.textContent = JSON.stringify({
              message: "Burst completed. Check Prometheus metrics and Argo Rollouts analysis.",
              recentSamples: recent
            }, null, 2);
            setStatus(state.fail > 0 ? "Burst completed with API errors." : "Burst completed successfully.", state.fail > 0);
          } finally {
            burstBtn.disabled = false;
            callBtn.disabled = false;
          }
        });
      </script>
    </body>
    </html>
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fe-nginx-config
  namespace: demo
  annotations:
    argocd.argoproj.io/sync-wave: '1'
data:
  default.conf: |
    server {
      listen 80;
      server_name _;

      location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
      }

      location /api/ {
        proxy_pass http://api.demo.svc.cluster.local:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: fe-svc
  namespace: demo
  annotations:
    argocd.argoproj.io/sync-wave: '2'
spec:
  selector:
    app: fe
  ports:
    - port: 8081
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fe
  namespace: demo
  annotations:
    argocd.argoproj.io/sync-wave: '2'
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fe
  template:
    metadata:
      labels:
        app: fe
    spec:
      containers:
        - name: fe
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: fe-page
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
              readOnly: true
            - name: fe-nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
      volumes:
        - name: fe-page
          configMap:
            name: fe-page
        - name: fe-nginx-config
          configMap:
            name: fe-nginx-config
