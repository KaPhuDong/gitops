apiVersion: v1
kind: Service
metadata:
  name: backend-svc
  namespace: demo
  annotations:
    argocd.argoproj.io/sync-wave: '1'
spec:
  selector:
    app: backend
  ports:
    - port: 5678
      targetPort: 5678
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: demo
  annotations:
    argocd.argoproj.io/sync-wave: '1'
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: hashicorp/http-echo:latest
          args:
            - '-text={"status": "success", "message": "Hello from NestJS/NodeJS Backend API!"}'
          ports:
            - containerPort: 5678
